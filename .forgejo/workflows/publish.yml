---
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch: null
name: Publish
permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: read
  discussions: read
  packages: write
  pages: write
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read
jobs:
  publish:
    runs-on: codeberg-medium
    container:
      image: ghcr.io/mcanouil/quarto-codespaces:latest
    concurrency:
      group: altdoc-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm libqpdf-dev libxslt1-dev \
      - name: Install TeX dependencies
        run: |
          # Download the latest tlmgr updater
          wget https://mirror.ctan.org/systems/texlive/tlnet/update-tlmgr-latest.sh
          sudo ./update-tlmgr-latest.sh --accept
          # Update tlmgr itself and all installed packages
          sudo tlmgr update --self --all
          # Install your LaTeX packages
          sudo tlmgr install caption fancyhdr ifmtarg koma-script moresize multirow wrapfig xifthen
      - uses: actions/cache@v4
        with:
          path: ~/.cache/R
          key: ${{ runner.os }}-r
      - name: Install R dependencies
        run: |
          Rscript -e "install.packages('pak', repos = 'https://r-lib.github.io/p/pak/stable/')"
          Rscript -e "pak::pkg_install(c('rmarkdown', 'knitr'))"
      - name: Build site
        run: |
          uv run quarto render
      - uses: actions/git-pages@v2
        with:
          site: https://adafede.codeberg.page/
          token: ${{ forge.token }}
          source: _site/
