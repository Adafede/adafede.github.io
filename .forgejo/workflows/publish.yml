name: Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch: null

permissions:
  contents: write

jobs:
  publish:
    runs-on: codeberg-medium
    container:
      image: ghcr.io/mcanouil/quarto-codespaces:latest
    concurrency:
      group: altdoc-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TEXINPUTS: "_texlocal:"  # Look for local LaTeX packages first
    permissions:
      contents: write

    steps:
      # Checkout repository
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Download the latest tlmgr updater
          wget https://mirror.ctan.org/systems/texlive/tlnet/update-tlmgr-latest.sh
          sudo sh update-tlmgr-latest.sh --accept
          # Update tlmgr itself and all installed packages
          sudo tlmgr update --self --all
          sudo apt-get install -y \
            nasm \
            libqpdf-dev \
            libxslt1-dev \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-science \
            texlive-luatex

      # Cache R packages
      - uses: actions/cache@v4
        with:
          path: ~/.cache/R
          key: ${{ runner.os }}-r

      # Install R dependencies
      - name: Install R dependencies
        run: |
          Rscript -e "install.packages('pak', repos='https://r-lib.github.io/p/pak/stable/')"
          Rscript -e "pak::pkg_install(c('rmarkdown','knitr'))"

      # Build the site
      - name: Build site
        run: uv run quarto render

      # Deploy to Codeberg Pages
      - name: Deploy to Codeberg Pages
        if: github.event_name != 'pull_request'
        uses: actions/git-pages@v2
        with:
          site: https://adafede.codeberg.page/
          token: ${{ forge.token }}
          source: _site/
