name: Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch: null

permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: read
  discussions: read
  packages: write
  pages: write
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: altdoc-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      TEXINPUTS: "_texlocal:"  # Look for local LaTeX packages first
    permissions:
      contents: write

    steps:
      # Checkout repository
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Install system dependencies and TeX Live
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            libqpdf-dev \
            libxslt1-dev \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-science \
            texlive-luatex

      # Setup UV with caching
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # Setup R
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::knitr
            any::rmarkdown

      # Setup Pandoc
      - uses: pandoc/actions/setup@v1

      # Setup Quarto without TinyTeX (use system TeX Live)
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: false

      # Build the site
      - name: Build site
        run: uv run quarto render

      # Deploy to GitHub Pages
      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site/
