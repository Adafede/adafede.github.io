---
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  release:
    types:
      - published
  workflow_dispatch: null
name: Publish
permissions:
  actions: write
  checks: write
  contents: write
  deployments: write
  id-token: write
  issues: read
  discussions: read
  packages: write
  pages: write
  pull-requests: read
  repository-projects: read
  security-events: read
  statuses: read
jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: altdoc-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm libqpdf-dev libxslt1-dev \
      - name: Install TeX dependencies
        run: |
          # Download the latest tlmgr updater
          wget https://mirror.ctan.org/systems/texlive/tlnet/update-tlmgr-latest.sh
          sudo sh update-tlmgr-latest.sh --accept
          # Update tlmgr itself and all installed packages
          sudo tlmgr update --self --all
          # Install your LaTeX packages
          sudo tlmgr install caption fancyhdr ifmtarg koma-script moresize multirow tikz wrapfig xifthen
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::knitr
            any::rmarkdown
      - uses: pandoc/actions/setup@v1
      - uses: r-lib/actions/setup-tinytex@v2
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
      - name: Build site
        run: |
          uv run quarto render
      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
